<svg width="560" height="560" viewBox="0 0 560 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated systems orbit for Dhruv Bhavsar">
  <defs>
    <radialGradient id="bgGrad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(280 280) rotate(90) scale(240)">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F6F6F7"/>
    </radialGradient>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <style>
      .ring-1 { stroke: #D8D9DE; stroke-width: 1.2; fill: none; }
      .ring-2 { stroke: #E4E5E8; stroke-width: 1; fill: none; }
      .label {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        fill: #6B6E76;
      }
      .center-title {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 52px;
        font-weight: 700;
        letter-spacing: -0.05em;
        fill: #101114;
      }
      .center-sub {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        fill: #8A8E96;
      }
      .node-shell {
        fill: rgba(255,255,255,0.88);
        stroke: #D7D9DE;
        stroke-width: 1.2;
      }
      .node-icon {
        stroke: #121317;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
      .tiny-dot {
        fill: #D2D4D9;
        opacity: 0.7;
      }
      .glow {
        fill: #D8DAE0;
        opacity: 0.35;
      }

      @media (prefers-reduced-motion: reduce) {
        .spin-slow, .spin-reverse, .pulse, .floaty {
          animation: none !important;
        }
      }
    </style>

    <path id="orbitPathOuter" d="M 280,100 A 180,180 0 1,1 279.9,100" />
    <path id="orbitPathMid" d="M 280,145 A 135,135 0 1,1 279.9,145" />
    <path id="orbitPathInner" d="M 280,190 A 90,90 0 1,1 279.9,190" />
  </defs>

  <!-- base -->
  <circle cx="280" cy="280" r="220" fill="url(#bgGrad)" />
  <circle cx="280" cy="280" r="220" class="ring-2" opacity="0.8"/>

  <!-- ambient dots -->
  <g>
    <circle class="tiny-dot" cx="165" cy="145" r="1.4"><animate attributeName="opacity" values="0.25;0.7;0.25" dur="4.8s" repeatCount="indefinite"/></circle>
    <circle class="tiny-dot" cx="205" cy="118" r="1.4"><animate attributeName="opacity" values="0.3;0.75;0.3" dur="5.2s" repeatCount="indefinite"/></circle>
    <circle class="tiny-dot" cx="360" cy="126" r="1.4"><animate attributeName="opacity" values="0.25;0.65;0.25" dur="4.4s" repeatCount="indefinite"/></circle>
    <circle class="tiny-dot" cx="410" cy="190" r="1.4"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="5.8s" repeatCount="indefinite"/></circle>
    <circle class="tiny-dot" cx="430" cy="300" r="1.4"><animate attributeName="opacity" values="0.25;0.7;0.25" dur="5.1s" repeatCount="indefinite"/></circle>
    <circle class="tiny-dot" cx="372" cy="422" r="1.4"><animate attributeName="opacity" values="0.25;0.8;0.25" dur="4.1s" repeatCount="indefinite"/></circle>
    <circle class="tiny-dot" cx="210" cy="438" r="1.4"><animate attributeName="opacity" values="0.25;0.7;0.25" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle class="tiny-dot" cx="130" cy="340" r="1.4"><animate attributeName="opacity" values="0.2;0.6;0.2" dur="5.7s" repeatCount="indefinite"/></circle>
    <circle class="tiny-dot" cx="138" cy="220" r="1.4"><animate attributeName="opacity" values="0.25;0.65;0.25" dur="4.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- glowing motion particles -->
  <g filter="url(#softBlur)">
    <circle class="glow" r="5">
      <animateMotion dur="10s" repeatCount="indefinite" rotate="auto">
        <mpath href="#orbitPathOuter"/>
      </animateMotion>
    </circle>
    <circle class="glow" r="4">
      <animateMotion dur="7.5s" repeatCount="indefinite" rotate="auto-reverse">
        <mpath href="#orbitPathMid"/>
      </animateMotion>
    </circle>
  </g>

  <!-- rings -->
  <g>
    <circle cx="280" cy="280" r="180" class="ring-1" stroke-dasharray="2 10" opacity="0.75"/>
    <circle cx="280" cy="280" r="135" class="ring-1" opacity="0.9"/>
    <circle cx="280" cy="280" r="90" class="ring-1" opacity="0.95"/>
  </g>

  <!-- center -->
  <g>
    <circle cx="280" cy="280" r="78" fill="#FBFBFC" stroke="#DCDDDF" stroke-width="1.2"/>
    <circle cx="280" cy="280" r="58" fill="none" stroke="#E7E8EB" stroke-width="1"/>
    <text class="center-title" x="280" y="300" text-anchor="middle">DB,</text>
  </g>

  <!-- outer orbit rotating clockwise -->
  <g>
    <animateTransform attributeName="transform"
      type="rotate"
      from="0 280 280"
      to="360 280 280"
      dur="28s"
      repeatCount="indefinite"/>

    <!-- AI agents node -->
    <g transform="translate(280 100)">
      <g>
        <!-- Reverse rotation to keep node and text upright -->
        <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="28s" repeatCount="indefinite"/>
        
        <circle class="node-shell" r="24"/>
        <circle cx="0" cy="0" r="24" fill="none" stroke="#ECEDEF" stroke-width="1">
          <animate attributeName="r" values="24;26;24" dur="3.6s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.6s" repeatCount="indefinite"/>
        </circle>
        
        <!-- spark / ai -->
        <path class="node-icon" d="M-6 -3 L0 -10 L6 -3 L0 10 Z"/>
        <path class="node-icon" d="M0 -10 V-14 M10 0 H14 M0 10 V14 M-10 0 H-14"/>
        
        <!-- text -->
        <text class="label" x="0" y="44" text-anchor="middle">AI AGENTS</text>
      </g>
    </g>

    <!-- backend node -->
    <g transform="translate(451 225)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="28s" repeatCount="indefinite"/>
        
        <circle class="node-shell" r="24"/>
        <circle cx="0" cy="0" r="24" fill="none" stroke="#ECEDEF" stroke-width="1">
          <animate attributeName="r" values="24;26;24" dur="4.2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.55;0.2;0.55" dur="4.2s" repeatCount="indefinite"/>
        </circle>
        
        <!-- server -->
        <rect x="-9" y="-9" width="18" height="7" rx="2" class="node-icon"/>
        <rect x="-9" y="2" width="18" height="7" rx="2" class="node-icon"/>
        <path class="node-icon" d="M-5 -5 H-4 M0 -5 H1 M-5 6 H-4 M0 6 H1"/>
        
        <text class="label" x="0" y="44" text-anchor="middle">BACKEND</text>
      </g>
    </g>

    <!-- APIs node -->
    <g transform="translate(386 426)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="28s" repeatCount="indefinite"/>
        
        <circle class="node-shell" r="24"/>
        <circle cx="0" cy="0" r="24" fill="none" stroke="#ECEDEF" stroke-width="1">
          <animate attributeName="r" values="24;26;24" dur="3.8s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.6;0.18;0.6" dur="3.8s" repeatCount="indefinite"/>
        </circle>
        
        <!-- brackets -->
        <path class="node-icon" d="M-7 -9 L-12 -9 L-12 9 L-7 9"/>
        <path class="node-icon" d="M7 -9 L12 -9 L12 9 L7 9"/>
        <path class="node-icon" d="M-2 7 L4 -7"/>
        
        <text class="label" x="0" y="44" text-anchor="middle">APIS</text>
      </g>
    </g>

    <!-- products node -->
    <g transform="translate(174 426)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="28s" repeatCount="indefinite"/>
        
        <circle class="node-shell" r="24"/>
        <circle cx="0" cy="0" r="24" fill="none" stroke="#ECEDEF" stroke-width="1">
          <animate attributeName="r" values="24;26;24" dur="4.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.58;0.16;0.58" dur="4.5s" repeatCount="indefinite"/>
        </circle>
        
        <!-- box / product -->
        <path class="node-icon" d="M0 -11 L10 -6 V6 L0 11 L-10 6 V-6 Z"/>
        <path class="node-icon" d="M-10 -6 L0 -1 L10 -6"/>
        <path class="node-icon" d="M0 -1 V11"/>
        
        <text class="label" x="0" y="44" text-anchor="middle">PRODUCTS</text>
      </g>
    </g>

    <!-- voice node -->
    <g transform="translate(109 225)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="28s" repeatCount="indefinite"/>
        
        <circle class="node-shell" r="24"/>
        <circle cx="0" cy="0" r="24" fill="none" stroke="#ECEDEF" stroke-width="1">
          <animate attributeName="r" values="24;26;24" dur="3.3s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.65;0.2;0.65" dur="3.3s" repeatCount="indefinite"/>
        </circle>
        
        <!-- mic -->
        <rect x="-5" y="-10" width="10" height="16" rx="5" class="node-icon"/>
        <path class="node-icon" d="M-10 2 C-10 10 -4 14 0 14 C4 14 10 10 10 2"/>
        <path class="node-icon" d="M0 14 V19 M-6 19 H6"/>
        
        <text class="label" x="0" y="44" text-anchor="middle">VOICE</text>
      </g>
    </g>
  </g>

  <!-- mid orbit rotating reverse -->
  <g>
    <animateTransform attributeName="transform"
      type="rotate"
      from="360 280 280"
      to="0 280 280"
      dur="20s"
      repeatCount="indefinite"/>

    <g transform="translate(280 145)">
      <circle r="9" fill="#FCFCFD" stroke="#D7D9DE" stroke-width="1.1"/>
      <path class="node-icon" d="M-3 0 H3 M0 -3 V3"/>
    </g>

    <g transform="translate(406 280)">
      <circle r="9" fill="#FCFCFD" stroke="#D7D9DE" stroke-width="1.1"/>
      <path class="node-icon" d="M-3 -3 L3 3 M3 -3 L-3 3"/>
    </g>

    <g transform="translate(280 415)">
      <circle r="9" fill="#FCFCFD" stroke="#D7D9DE" stroke-width="1.1"/>
      <path class="node-icon" d="M-3 0 H3"/>
    </g>

    <g transform="translate(145 280)">
      <circle r="9" fill="#FCFCFD" stroke="#D7D9DE" stroke-width="1.1"/>
      <path class="node-icon" d="M0 -3 V3"/>
    </g>
  </g>

  <!-- inner orbit subtle float -->
  <g>
    <animateTransform attributeName="transform"
      type="rotate"
      from="0 280 280"
      to="360 280 280"
      dur="14s"
      repeatCount="indefinite"/>

    <g transform="translate(280 190)">
      <circle r="6" fill="#111216"/>
      <animate attributeName="opacity" values="0.35;0.9;0.35" dur="2.6s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(370 280)">
      <circle r="6" fill="#111216"/>
      <animate attributeName="opacity" values="0.35;0.75;0.35" dur="3.1s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(280 370)">
      <circle r="6" fill="#111216"/>
      <animate attributeName="opacity" values="0.35;0.8;0.35" dur="2.9s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(190 280)">
      <circle r="6" fill="#111216"/>
      <animate attributeName="opacity" values="0.35;0.7;0.35" dur="3.4s" repeatCount="indefinite"/>
    </g>
  </g>
</svg>
